version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: walletiq-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: walletiqdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  web:
    build: .
    container_name: walletiq-web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=walletiqdb
      - SECRET_KEY=production_secret_key_change_me
      - GEMINI_API_KEY=AIzaSy...
    depends_on:
      - db

volumes:
  mysql-data:
